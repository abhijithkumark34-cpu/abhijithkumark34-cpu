<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 780 500" width="780" height="500" role="img" aria-label="Project Showcase Carousel">

  <defs>
    <clipPath id="card-clip">
      <rect width="780" height="500" rx="18"/>
    </clipPath>
    <clipPath id="img-clip">
      <rect x="0" y="48" width="780" height="378"/>
    </clipPath>
    <!--
    ═══════════════════════════════════════════════════════════════
      TIMING  (dur=20s · 4 slides · 5s each)
      Each slide: 0.6s fade-in | 3.8s hold | 0.6s fade-out

      Slide 1: keyTimes="0;0.220;0.250;0.970;1"           values="1;1;0;0;1"
      Slide 2: keyTimes="0;0.250;0.280;0.470;0.500;1"     values="0;0;1;1;0;0"
      Slide 3: keyTimes="0;0.500;0.530;0.720;0.750;1"     values="0;0;1;1;0;0"
      Slide 4: keyTimes="0;0.750;0.780;0.970;1"           values="0;0;1;1;0"
    ═══════════════════════════════════════════════════════════════
    -->
  </defs>

  <!-- CARD BACKGROUND -->
  <rect width="780" height="500" fill="#0d1117" rx="18"/>

  <g clip-path="url(#card-clip)">

    <!-- ══ SLIDE 1 ══════════════════════════════════════════════ -->
    <g opacity="1">
      <animate attributeName="opacity"
               values="1;1;0;0;1"
               keyTimes="0;0.220;0.250;0.970;1"
               dur="20s" repeatCount="indefinite" calcMode="linear"/>
      <image
        xlink:href="https://raw.githubusercontent.com/abhijithkumark34-cpu/abhijithkumark34-cpu/166bdecbc68e890093b2f188ef721dd0d8696f41/Screenshot%202026-03-17%20172538.png"
             href="https://raw.githubusercontent.com/abhijithkumark34-cpu/abhijithkumark34-cpu/166bdecbc68e890093b2f188ef721dd0d8696f41/Screenshot%202026-03-17%20172538.png"
             x="0" y="48" width="780" height="378"
             preserveAspectRatio="xMidYMid slice"
             clip-path="url(#img-clip)"/>
    </g>

    <!-- ══ SLIDE 2 ══════════════════════════════════════════════ -->
    <g opacity="0">
      <animate attributeName="opacity"
               values="0;0;1;1;0;0"
               keyTimes="0;0.250;0.280;0.470;0.500;1"
               dur="20s" repeatCount="indefinite" calcMode="linear"/>
      <image
        xlink:href="https://raw.githubusercontent.com/abhijithkumark34-cpu/abhijithkumark34-cpu/166bdecbc68e890093b2f188ef721dd0d8696f41/Screenshot%202026-03-31%20220535.png"
             href="https://raw.githubusercontent.com/abhijithkumark34-cpu/abhijithkumark34-cpu/166bdecbc68e890093b2f188ef721dd0d8696f41/Screenshot%202026-03-31%20220535.png"
             x="0" y="48" width="780" height="378"
             preserveAspectRatio="xMidYMid slice"
             clip-path="url(#img-clip)"/>
    </g>

    <!-- ══ SLIDE 3 ══════════════════════════════════════════════ -->
    <g opacity="0">
      <animate attributeName="opacity"
               values="0;0;1;1;0;0"
               keyTimes="0;0.500;0.530;0.720;0.750;1"
               dur="20s" repeatCount="indefinite" calcMode="linear"/>
      <image
        xlink:href="https://raw.githubusercontent.com/abhijithkumark34-cpu/abhijithkumark34-cpu/166bdecbc68e890093b2f188ef721dd0d8696f41/Screenshot%202026-04-02%20211725.png"
             href="https://raw.githubusercontent.com/abhijithkumark34-cpu/abhijithkumark34-cpu/166bdecbc68e890093b2f188ef721dd0d8696f41/Screenshot%202026-04-02%20211725.png"
             x="0" y="48" width="780" height="378"
             preserveAspectRatio="xMidYMid slice"
             clip-path="url(#img-clip)"/>
    </g>

    <!-- ══ SLIDE 4 ══════════════════════════════════════════════ -->
    <g opacity="0">
      <animate attributeName="opacity"
               values="0;0;1;1;0"
               keyTimes="0;0.750;0.780;0.970;1"
               dur="20s" repeatCount="indefinite" calcMode="linear"/>
      <image
        xlink:href="https://raw.githubusercontent.com/abhijithkumark34-cpu/abhijithkumark34-cpu/fb3e9cd00c3b6f34aee99845f72f3fbe32cc4992/Screenshot%202026-03-18%20215908.png"
             href="https://raw.githubusercontent.com/abhijithkumark34-cpu/abhijithkumark34-cpu/fb3e9cd00c3b6f34aee99845f72f3fbe32cc4992/Screenshot%202026-03-18%20215908.png"
             x="0" y="48" width="780" height="378"
             preserveAspectRatio="xMidYMid slice"
             clip-path="url(#img-clip)"/>
    </g>

    <!-- CHROME BAR -->
    <rect width="780" height="48" fill="#161b22"/>
    <line x1="0" y1="48" x2="780" y2="48" stroke="#21262d" stroke-width="1"/>
    <circle cx="26" cy="24" r="6.5" fill="#ff5f57"/>
    <circle cx="48" cy="24" r="6.5" fill="#febc2e"/>
    <circle cx="70" cy="24" r="6.5" fill="#28c840"/>
    <rect x="96" y="13" width="588" height="22" fill="#0d1117" rx="11"/>
    <text x="390" y="24.5" text-anchor="middle" dominant-baseline="middle"
          fill="#484f58"
          font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace"
          font-size="11.5" letter-spacing="0.2">github.com/abhijithkumark34-cpu</text>
    <rect x="696" y="14" width="20" height="20" fill="#21262d" rx="4"/>
    <text x="706" y="27" text-anchor="middle" fill="#484f58" font-size="12">&#x2665;</text>
    <rect x="720" y="14" width="20" height="20" fill="#21262d" rx="4"/>
    <text x="730" y="27" text-anchor="middle" fill="#484f58" font-size="14">&#x22EF;</text>

    <!-- PROGRESS BAR -->
    <rect x="0" y="47" height="2" fill="#4361ee">
      <animate attributeName="width"
               values="0;780;0;780;0;780;0;780;0"
               keyTimes="0;0.220;0.280;0.470;0.530;0.720;0.780;0.970;1"
               dur="20s" repeatCount="indefinite" calcMode="linear"/>
      <animate attributeName="opacity"
               values="0.85;0.85;0;0.85;0.85;0;0.85;0.85;0"
               keyTimes="0;0.220;0.280;0.470;0.530;0.720;0.780;0.970;1"
               dur="20s" repeatCount="indefinite" calcMode="linear"/>
    </rect>

    <!-- FOOTER BAR -->
    <rect x="0" y="426" width="780" height="74" fill="#161b22"/>
    <line x1="0" y1="426" x2="780" y2="426" stroke="#21262d" stroke-width="1"/>

    <!-- SLIDE 1 TEXT -->
    <g opacity="1">
      <animate attributeName="opacity"
               values="1;1;0;0;1"
               keyTimes="0;0.220;0.250;0.970;1"
               dur="20s" repeatCount="indefinite" calcMode="linear"/>
      <text x="390" y="453" text-anchor="middle"
            fill="#e6edf3" font-size="15.5" font-weight="700" letter-spacing="0.3"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
        &#x1F680;&#xFE0F; Project One
      </text>
      <text x="390" y="473" text-anchor="middle"
            fill="#6e7681" font-size="12.5" letter-spacing="0.1"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
       
      </text>
    </g>

    <!-- SLIDE 2 TEXT -->
    <g opacity="0">
      <animate attributeName="opacity"
               values="0;0;1;1;0;0"
               keyTimes="0;0.250;0.280;0.470;0.500;1"
               dur="20s" repeatCount="indefinite" calcMode="linear"/>
      <text x="390" y="453" text-anchor="middle"
            fill="#e6edf3" font-size="15.5" font-weight="700" letter-spacing="0.3"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
        &#x26A1;&#xFE0F; Project Two
      </text>
      <text x="390" y="473" text-anchor="middle"
            fill="#6e7681" font-size="12.5" letter-spacing="0.1"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
      
      </text>
    </g>

    <!-- SLIDE 3 TEXT -->
    <g opacity="0">
      <animate attributeName="opacity"
               values="0;0;1;1;0;0"
               keyTimes="0;0.500;0.530;0.720;0.750;1"
               dur="20s" repeatCount="indefinite" calcMode="linear"/>
      <text x="390" y="453" text-anchor="middle"
            fill="#e6edf3" font-size="15.5" font-weight="700" letter-spacing="0.3"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
        &#x1F31F; Project Three
      </text>
      <text x="390" y="473" text-anchor="middle"
            fill="#6e7681" font-size="12.5" letter-spacing="0.1"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
        
      </text>
    </g>

    <!-- SLIDE 4 TEXT -->
    <g opacity="0">
      <animate attributeName="opacity"
               values="0;0;1;1;0"
               keyTimes="0;0.750;0.780;0.970;1"
               dur="20s" repeatCount="indefinite" calcMode="linear"/>
      <text x="390" y="453" text-anchor="middle"
            fill="#e6edf3" font-size="15.5" font-weight="700" letter-spacing="0.3"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
        &#x1F4A1; Project Four
      </text>
      <text x="390" y="473" text-anchor="middle"
            fill="#6e7681" font-size="12.5" letter-spacing="0.1"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
        Replace this with your project description
      </text>
    </g>

    <!-- NAV DOTS (4 dots, fixed positions, only fill animates) -->
    <!-- Dot 1 — active during slide 1 -->
    <rect x="365" y="486" width="8" height="8" rx="4" fill="#4361ee">
      <animate attributeName="fill"
               values="#4361ee;#4361ee;#2d333b;#2d333b;#4361ee"
               keyTimes="0;0.220;0.250;0.970;1"
               dur="20s" repeatCount="indefinite" calcMode="linear"/>
    </rect>
    <!-- Dot 2 — active during slide 2 -->
    <rect x="379" y="486" width="8" height="8" rx="4" fill="#2d333b">
      <animate attributeName="fill"
               values="#2d333b;#2d333b;#4361ee;#4361ee;#2d333b;#2d333b"
               keyTimes="0;0.250;0.280;0.470;0.500;1"
               dur="20s" repeatCount="indefinite" calcMode="linear"/>
    </rect>
    <!-- Dot 3 — active during slide 3 -->
    <rect x="393" y="486" width="8" height="8" rx="4" fill="#2d333b">
      <animate attributeName="fill"
               values="#2d333b;#2d333b;#4361ee;#4361ee;#2d333b;#2d333b"
               keyTimes="0;0.500;0.530;0.720;0.750;1"
               dur="20s" repeatCount="indefinite" calcMode="linear"/>
    </rect>
    <!-- Dot 4 — active during slide 4 -->
    <rect x="407" y="486" width="8" height="8" rx="4" fill="#2d333b">
      <animate attributeName="fill"
               values="#2d333b;#2d333b;#4361ee;#4361ee;#2d333b"
               keyTimes="0;0.750;0.780;0.970;1"
               dur="20s" repeatCount="indefinite" calcMode="linear"/>
    </rect>

  </g>

  <!-- CARD BORDER OVERLAY -->
  <rect width="780" height="500" fill="none" rx="18" stroke="#30363d" stroke-width="1"/>

</svg>
